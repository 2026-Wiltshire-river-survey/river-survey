<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>River Water Survey Portal</title>
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/agent.css">
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="login-wrap">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 24 Q10 16 20 20 Q30 24 36 16" stroke="#2563A8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M4 30 Q10 22 20 26 Q30 30 36 22" stroke="#2563A8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
        <circle cx="20" cy="13" r="4" fill="#2563A8" opacity="0.15" stroke="#2563A8" stroke-width="1.5"/>
        <path d="M20 9 L20 6 M16 11 L13 9 M24 11 L27 9" stroke="#2563A8" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div>
        <h1>River Survey Portal</h1>
        <p class="subtitle">Field data collection system</p>
      </div>
    </div>
    <div class="card">
      <div id="login-error" class="alert alert-error hidden"></div>
      <div class="field">
        <label for="login-name">Full name</label>
        <input id="login-name" type="text" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="field">
        <label for="login-id">Agent ID</label>
        <input id="login-id" type="text" placeholder="e.g. AG-0042" autocomplete="off">
      </div>
      <div class="field">
        <label for="login-region">Region</label>
        <select id="login-region">
          <option value="">Select region...</option>
          <option>North West</option>
          <option>North East</option>
          <option>Yorkshire</option>
          <option>Midlands</option>
          <option>East of England</option>
          <option>London</option>
          <option>South East</option>
          <option>South West</option>
          <option>Wales</option>
          <option>Scotland</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign in</button>
    </div>
    <p class="login-admin-link">Admin? <a href="admin.html">Go to admin panel &rarr;</a></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="screen-main" class="screen hidden">
  <nav class="topnav">
    <div class="topnav-brand">
      <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
        <path d="M4 24 Q10 16 20 20 Q30 24 36 16" stroke="#2563A8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M4 30 Q10 22 20 26 Q30 30 36 22" stroke="#2563A8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span>River Survey Portal</span>
    </div>
    <div class="topnav-agent">
      <span id="nav-name" class="nav-name"></span>
      <span id="nav-region" class="badge badge-blue"></span>
      <button class="btn btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </nav>

  <div class="container">
    <div class="tabs">
      <button class="tab active" id="tab-new" onclick="switchTab('new')">New reading</button>
      <button class="tab" id="tab-mine" onclick="switchTab('mine')">My submissions</button>
    </div>

    <!-- NEW READING PANE -->
    <div id="pane-new">
      <div id="no-config" class="alert alert-info hidden">
        No survey fields have been configured yet. Please contact your administrator.
      </div>
      <div id="survey-form-wrap"></div>
    </div>

    <!-- MY SUBMISSIONS PANE -->
    <div id="pane-mine" class="hidden">
      <div class="pane-header">
        <p id="mine-status" class="status-text"></p>
        <div class="pane-header-actions">
          <button class="btn btn-sm" onclick="loadMine()">&#8635; Refresh</button>
          <button class="btn btn-sm" onclick="exportMineCSV()">&#8595; Export CSV</button>
        </div>
      </div>
      <div id="mine-wrap"></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/agent.js"></script>
</body>
</html>
